<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام المايك الاحترافي - لوحة التحكم</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <style>
        body {
            background-color: #0f0f14;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: #1a1a24;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 400px;
            border: 1px solid #2a2a35;
        }
        h1 { color: #ff8200; margin-bottom: 20px; font-size: 24px; }
        input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #252530;
            color: white;
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
        }
        button {
            background: #ff8200;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #e67500; transform: scale(1.05); }
        .status { margin-top: 20px; font-size: 14px; color: #888; }
        .active-users {
            margin-top: 20px;
            width: 100%;
            max-height: 150px;
            overflow-y: auto;
            text-align: right;
        }
        .user-item {
            background: #252530;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>نظام المايك الاحترافي</h1>
        <p>أدخل الكود الظاهر لك في روبلوكس للربط</p>
        <input type="text" id="linkCode" placeholder="000000" maxlength="6">
        <br>
        <button id="connectBtn">ربط الحساب وبدء الصوت</button>
        
        <div class="status" id="statusText">غير متصل</div>
        
        <div class="active-users" id="userList">
            <!-- سيظهر اللاعبين القريبين هنا -->
        </div>
    </div>

    <script>
        const socket = io();
        let myStream;
        let peers = {};
        let myUserId = null;

        const connectBtn = document.getElementById('connectBtn');
        const linkCodeInput = document.getElementById('linkCode');
        const statusText = document.getElementById('statusText');
        const userList = document.getElementById('userList');

        connectBtn.onclick = async () => {
            const code = linkCodeInput.value;
            if (code.length !== 6) return alert("الرجاء إدخال كود صحيح");

            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                socket.emit('link_account', code);
                statusText.innerText = "جاري الربط...";
            } catch (err) {
                alert("يرجى السماح بالوصول للمايكروفون");
            }
        };

        socket.on('link_success', (data) => {
            myUserId = data.userId;
            statusText.innerText = "تم الربط بنجاح! أنت متصل الآن";
            statusText.style.color = "#00ff00";
            connectBtn.style.display = "none";
            linkCodeInput.style.display = "none";
        });

        socket.on('link_error', (msg) => {
            alert(msg);
            statusText.innerText = "خطأ في الربط";
        });

        socket.on('signal', (data) => {
            const { from, signal } = data;
            if (!peers[from]) {
                peers[from] = createPeer(from, false);
            }
            peers[from].signal(signal);
        });

        socket.on('positions_updated', (allPlayers) => {
            if (!myUserId || !allPlayers[myUserId]) return;
            
            const myPos = allPlayers[myUserId].pos;
            userList.innerHTML = "";

            Object.values(allPlayers).forEach(player => {
                if (player.userId === myUserId) return;

                const dist = Math.sqrt(
                    Math.pow(player.pos.x - myPos.x, 2) +
                    Math.pow(player.pos.y - myPos.y, 2) +
                    Math.pow(player.pos.z - myPos.z, 2)
                );

                if (dist < 50) {
                    if (!peers[player.socketId]) {
                        peers[player.socketId] = createPeer(player.socketId, true);
                    }
                    if (peers[player.socketId].audioElement) {
                        const volume = Math.max(0, 1 - (dist / 50));
                        peers[player.socketId].audioElement.volume = volume;
                    }
                }

                const item = document.createElement('div');
                item.className = "user-item";
                item.innerHTML = `<span>لاعب ID: ${player.userId}</span> <span style="color:#ff8200">${Math.floor(dist)}m</span>`;
                userList.appendChild(item);
            });
        });

        function createPeer(targetSocketId, initiator) {
            const peer = new SimplePeer({
                initiator: initiator,
                trickle: false,
                stream: myStream
            });

            peer.on('signal', (signal) => {
                socket.emit('signal', { to: targetSocketId, signal });
            });

            peer.on('stream', (stream) => {
                const audio = new Audio();
                audio.srcObject = stream;
                audio.play();
                peer.audioElement = audio;
            });

            peer.on('close', () => {
                if (peer.audioElement) peer.audioElement.remove();
                delete peers[targetSocketId];
            });

            return peer;
        }
    </script>
</body>
</html>
