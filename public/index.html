<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام المايك الاحترافي - لوحة التحكم</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <style>
        body {
            background-color: #0f0f14;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: #1a1a24;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 420px;
            border: 1px solid #2a2a35;
        }
        h1 { color: #ff8200; margin-bottom: 20px; font-size: 24px; }
        .input-group { margin-bottom: 20px; }
        input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #2a2a35;
            background: #252530;
            color: white;
            text-align: center;
            font-size: 20px;
            transition: 0.3s;
        }
        input:focus { border-color: #ff8200; outline: none; }
        button {
            background: #ff8200;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }
        button:hover { background: #e67500; transform: translateY(-2px); }
        .status { margin-top: 15px; font-size: 15px; color: #888; font-weight: 500; }
        .user-list {
            margin-top: 25px;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            text-align: right;
            padding-right: 5px;
        }
        .user-item {
            background: #252530;
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 4px solid #444;
        }
        .user-item.nearby { border-right-color: #00ff00; background: #2a352a; }
        .voice-indicator {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #333;
            color: #ccc;
        }
        .nearby .voice-indicator { background: #006400; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>نظام المايك الاحترافي</h1>
        <div id="setupArea">
            <p style="color: #bbb; margin-bottom: 15px;">أدخل كود الربط من داخل اللعبة</p>
            <div class="input-group">
                <input type="text" id="linkCode" placeholder="000000" maxlength="6">
            </div>
            <button id="connectBtn">تفعيل المايك والربط</button>
        </div>
        
        <div class="status" id="statusText">بانتظار الربط...</div>
        
        <div class="user-list" id="userList">
            <!-- قائمة اللاعبين القريبين -->
        </div>
    </div>

    <script>
        const socket = io();
        let myStream;
        let peers = {};
        let myUserId = null;
        let myId = null;

        const connectBtn = document.getElementById('connectBtn');
        const linkCodeInput = document.getElementById('linkCode');
        const statusText = document.getElementById('statusText');
        const userList = document.getElementById('userList');
        const setupArea = document.getElementById('setupArea');

        // سيرفرات المساعدة للربط عبر الإنترنت
        const iceServers = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];

        connectBtn.onclick = async () => {
            const code = linkCodeInput.value;
            if (code.length !== 6) return alert("الرجاء إدخال كود الربط المكون من 6 أرقام");

            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                socket.emit('link_account', code);
                statusText.innerText = "جاري التحقق من الكود...";
                myId = socket.id;
            } catch (err) {
                console.error(err);
                alert("يجب السماح بالوصول للمايكروفون ليعمل النظام");
            }
        };

        socket.on('link_success', (data) => {
            myUserId = data.userId;
            statusText.innerText = "متصل بنجاح ✅";
            statusText.style.color = "#00ff00";
            setupArea.style.display = "none";
        });

        socket.on('link_error', (msg) => {
            alert(msg);
            statusText.innerText = "فشل الربط ❌";
        });

        socket.on('signal', (data) => {
            const { from, signal } = data;
            if (!peers[from]) {
                console.log("Receiving signal from:", from);
                peers[from] = createPeer(from, false);
            }
            peers[from].signal(signal);
        });

        socket.on('positions_updated', (allPlayers) => {
            if (!myUserId || !allPlayers[myUserId]) return;
            
            const myPos = allPlayers[myUserId].pos;
            userList.innerHTML = "";

            Object.values(allPlayers).forEach(player => {
                if (player.userId === myUserId) return;

                const dist = Math.sqrt(
                    Math.pow(player.pos.x - myPos.x, 2) +
                    Math.pow(player.pos.y - myPos.y, 2) +
                    Math.pow(player.pos.z - myPos.z, 2)
                );

                // المسافة القصوى لسماع الصوت هي 60 متر
                if (dist < 60) {
                    // الطرف الذي له Socket ID أصغر هو من يبدأ الاتصال لمنع التصادم
                    if (!peers[player.socketId] && socket.id < player.socketId) {
                        console.log("Initiating peer with:", player.socketId);
                        peers[player.socketId] = createPeer(player.socketId, true);
                    }
                    
                    // تحكم في مستوى الصوت
                    if (peers[player.socketId] && peers[player.socketId].audioElement) {
                        const volume = Math.max(0, 1 - (dist / 60));
                        peers[player.socketId].audioElement.volume = volume;
                    }

                    // إضافة للواجهة بدون ذكر الأمتار
                    const item = document.createElement('div');
                    item.className = "user-item nearby";
                    item.innerHTML = `<span>لاعب متصل</span> <span class="voice-indicator">قريب منك 🔊</span>`;
                    userList.appendChild(item);
                }
            });
        });

        function createPeer(targetSocketId, initiator) {
            const peer = new SimplePeer({
                initiator: initiator,
                trickle: false,
                stream: myStream,
                config: { iceServers: iceServers }
            });

            peer.on('signal', (signal) => {
                socket.emit('signal', { to: targetSocketId, signal });
            });

            peer.on('stream', (stream) => {
                console.log("Audio stream received from:", targetSocketId);
                const audio = new Audio();
                audio.srcObject = stream;
                audio.play().catch(e => console.error("Audio play failed:", e));
                peer.audioElement = audio;
            });

            peer.on('error', (err) => console.error('Peer error:', err));
            
            peer.on('close', () => {
                if (peer.audioElement) peer.audioElement.remove();
                delete peers[targetSocketId];
            });

            return peer;
        }
    </script>
</body>
</html>
